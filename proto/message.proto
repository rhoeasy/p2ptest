syntax = "proto3";

package p2pmsg;

// 生成路径：按source_relative规则，生成到proto目录下，包名p2pmsg
option go_package = "./proto/p2pmsg";

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

// ========== 核心枚举定义（替代字符串，编译期校验） ==========
// NAT类型（P2P穿透核心）
enum NatType {
  NAT_UNKNOWN = 0; // 未知
  NAT_PORT_RESTRICTED = 1; // 端口限制锥型
  NAT_ADDRESS_RESTRICTED = 2; // 地址限制锥型
  NAT_FULL_CONE = 3; // 全锥型
  NAT_SYMMETRIC = 4; // 对称型（最难穿透）
  NAT_PUBLIC = 5; // 公网（无NAT）
}

// 节点状态
enum NodeStatus {
  NODE_STATUS_UNKNOWN = 0;
  NODE_STATUS_ONLINE = 1;
  NODE_STATUS_BUSY = 2;
  NODE_STATUS_OFFLINE = 3;
}

// 消息类型（覆盖P2P核心场景）
enum MessageType {
  MSG_UNKNOWN = 0;
  MSG_TEXT = 1; // 文本消息
  MSG_HEARTBEAT = 2; // 心跳
  MSG_JOIN = 3; // 加入网络
  MSG_LEAVE = 4; // 离开网络
  MSG_FIND_NODE = 5; // 查找节点
  MSG_NODE_INFO = 6; // 节点信息响应
  MSG_FILE_PIECE = 7; // 文件分片
  MSG_ACK = 8; // 消息确认
  MSG_ERROR = 9; // 错误通知
}

// 错误码（标准化机器解析）
enum ErrorCode {
  ERR_SUCCESS = 0; // 成功
  ERR_NODE_EXIST = 1; // 节点已存在
  ERR_NODE_NOT_FOUND = 2; // 节点未找到
  ERR_NAT_FAILED = 3; // NAT穿透失败
  ERR_SIGN_INVALID = 4; // 签名无效
  ERR_NETWORK = 5; // 网络错误
  ERR_VERSION = 6; // 版本不兼容
  ERR_INVALID_ARGUMENT = 7;
}

// ========== 基础通用结构 ==========
// 节点唯一标识（P2P核心）
message NodeID {
  string uuid = 1; // 全局唯一UUID（核心标识）
  string name = 2; // 可读名称（非唯一）
  bytes hash = 3; // UUID的哈希值（用于DHT寻址）
}

// 节点网络信息（适配NAT穿透）
message NodeAddr {
  string ip = 1; // IP地址
  uint32 port = 2; // 端口
  NatType nat_type = 3; // NAT类型
  bool is_public = 4; // 是否公网地址
  string protocol = 5; // 协议类型（tcp/udp）
}

// 节点完整信息
message NodeInfo {
  NodeID id = 1; // 唯一标识
  repeated NodeAddr addrs = 2; // 多地址（公网+内网）
  NodeStatus status = 3; // 节点状态
  uint64 heartbeat_interval = 4; // 心跳间隔（毫秒）
  string version = 5; // 节点版本（如v1.0.0）
  google.protobuf.Timestamp last_active = 6; // 最后活跃时间
}

// 通用错误响应
message ErrorResp {
  ErrorCode code = 1; // 错误码
  string msg = 2; // 可读错误信息
  uint32 version = 3; // 协议版本
}

// ========== P2P核心消息（基于通用结构扩展） ==========
// 节点加入请求（替代原P2PNetworkJoinReq）
message JoinReq {
  NodeInfo node_info = 1; // 节点完整信息
  uint32 proto_version = 2; // 协议版本（兼容用）
  bytes signature = 3; // 节点信息签名（防伪造）
}

// 节点加入响应（替代原P2PNetworkJoinRepl）
message JoinResp {
  bool success = 1; // 是否成功
  ErrorResp error = 2; // 错误信息（失败时非空）
  repeated NodeInfo peers = 3; // 在线节点列表
  uint32 proto_version = 4; // 服务端协议版本
}

// 心跳请求（替代原P2PNetworkHeartBeat）
message HeartbeatReq {
  NodeID node_id = 1; // 节点ID
  NodeStatus status = 2; // 节点状态
  uint64 timestamp = 3; // 时间戳（毫秒）
  bytes signature = 4; // 心跳签名
}

// 通用消息（替代原P2PMessage）
message P2PMessage {
  string msg_id = 1; // 消息唯一ID（去重/ACK）
  MessageType type = 2; // 消息类型（枚举）
  NodeID from = 3; // 发送节点
  uint32 proto_version = 4; // 协议版本
  google.protobuf.Timestamp send_time = 5; // 发送时间

  // 消息内容（按类型区分）
  oneof content {
    string text = 6; // 文本内容（MSG_TEXT）
    HeartbeatReq heartbeat = 7; // 心跳内容（MSG_HEARTBEAT）
    FindNodeReq find_node = 8; // 查找节点（MSG_FIND_NODE）
    NodeInfoResp node_info = 9; // 节点信息（MSG_NODE_INFO）
    FilePiece file_piece = 10; // 文件分片（MSG_FILE_PIECE）
    ACKReq ack = 11; // 消息确认（MSG_ACK）
    ErrorResp error = 12; // 错误信息（MSG_ERROR）
  }

  bytes content_hash = 13; // 内容哈希（防篡改）
  bytes signature = 14; // 消息签名（验真）
  reserved 15 to 20;             // 预留字段（扩展用）
}

// 查找节点请求
message FindNodeReq {
  NodeID target_node = 1; // 目标节点ID
  uint32 limit = 2; // 返回节点数量限制
}

// 节点信息响应
message NodeInfoResp {
  repeated NodeInfo nodes = 1; // 匹配的节点列表
  ErrorResp error = 2; // 错误信息
}

// 文件分片传输（P2P文件共享核心）
message FilePiece {
  string file_id = 1; // 文件唯一ID
  uint32 piece_index = 2; // 分片索引（从0开始）
  uint32 total_pieces = 3; // 总分片数
  bytes data = 4; // 分片数据
  bytes piece_hash = 5; // 分片哈希（校验）
  bool is_last = 6; // 是否最后一个分片
}

// 消息确认（可靠性核心）
message ACKReq {
  string msg_id = 1; // 被确认的消息ID
  bool success = 2; // 是否接收成功
  ErrorResp error = 3; // 失败原因
}

// ========== 对等性Service设计（贴合P2P） ==========
// P2P对等服务：每个节点都实现这个Service，既是服务端也是客户端
service P2PPeerService {
  // 1. 节点加入（简单RPC，兼容中心化种子节点）
  rpc Join(JoinReq) returns (JoinResp);
  // 👇 新增：通知其他节点有新节点上线
  rpc NotifyNodeJoin(NodeInfo) returns (google.protobuf.Empty);
  // 节点下线
  rpc Leave(NodeID) returns (google.protobuf.Empty);

  // 2. 发送心跳（简单RPC）
  rpc SendHeartbeat(HeartbeatReq) returns (google.protobuf.Empty);

  // 3. 查找节点（简单RPC，DHT核心）
  rpc FindNode(FindNodeReq) returns (NodeInfoResp);

  // 4. 对等消息流（双向流式RPC，核心！）
  // 每个节点都可以通过这个流收发所有类型的P2PMessage
  rpc PeerMessageStream(stream P2PMessage) returns (stream P2PMessage);
}